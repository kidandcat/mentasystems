<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menta Systems</title>
    <meta name="description" content="Menta Systems">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stealth-bg-from: #060a0e;
            --stealth-bg-to: #0a1620;
            --stealth-glow: rgba(80, 170, 220, 0.55);
            --stealth-particle: rgba(120, 200, 240, 0.85);
            --stealth-line: rgba(80, 170, 220, 0.25);
        }
        html, body {
            background: radial-gradient(ellipse at 50% 40%, var(--stealth-bg-to) 0%, var(--stealth-bg-from) 70%);
            color: #cfd8dc;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .stealth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        #particles-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }
        .stealth-vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 50%, transparent 0%, transparent 55%, rgba(0,0,0,0.65) 100%),
                radial-gradient(circle at 50% 45%, var(--stealth-glow) 0%, transparent 35%);
            mix-blend-mode: screen;
            opacity: 0.45;
        }
        .stealth-content {
            text-align: center;
            position: relative;
            z-index: 2;
            animation: stealth-breathe 6s ease-in-out infinite;
        }
        @keyframes stealth-breathe {
            0%, 100% { opacity: 0.92; transform: translateY(0); }
            50%      { opacity: 1;    transform: translateY(-2px); }
        }
        .stealth-brand {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5.25rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #e8f3fa;
            text-shadow:
                0 0 18px rgba(80, 170, 220, 0.45),
                0 0 60px rgba(80, 170, 220, 0.2);
        }
        .stealth-brand-icon {
            height: 1em;
            width: auto;
            border-radius: 10px;
            filter: drop-shadow(0 0 12px rgba(80, 170, 220, 0.5));
        }
        .stealth-brand-accent {
            font-weight: 300;
            color: #8aa4b3;
            letter-spacing: 0.18em;
        }
        .stealth-footer {
            position: relative;
            z-index: 2;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.25rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(207, 216, 220, 0.45);
            background: rgba(6, 10, 14, 0.4);
            backdrop-filter: blur(6px);
        }
        .stealth-footer a {
            color: rgba(207, 216, 220, 0.7);
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.2s ease;
        }
        .stealth-footer a:hover {
            color: #e8f3fa;
        }
        @media (prefers-reduced-motion: reduce) {
            .stealth-content { animation: none; }
        }
    </style>
</head>
<body>
    <main class="stealth-main">
        <canvas id="particles-canvas" aria-hidden="true"></canvas>
        <div class="stealth-vignette" aria-hidden="true"></div>
        <div class="stealth-content">
            <div class="stealth-brand">
                <img src="icon.png" alt="" class="stealth-brand-icon">
                MENTA<span class="stealth-brand-accent">systems</span>
            </div>
        </div>
    </main>

    <footer class="stealth-footer">
        <span>&copy; 2025 Menta Systems</span>
        <span aria-hidden="true">·</span>
        <a href="aviso-legal.html">Aviso Legal</a>
        <span aria-hidden="true">·</span>
        <a href="politica-privacidad.html">Política de Privacidad</a>
    </footer>

    <script>
        (function () {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
            const particles = [];
            const mouse = { x: -9999, y: -9999, active: false };
            const LINK_DIST = 130;
            const LINK_DIST_SQ = LINK_DIST * LINK_DIST;
            const MOUSE_RADIUS = 140;

            function resize() {
                const rect = canvas.getBoundingClientRect();
                width = rect.width;
                height = rect.height;
                canvas.width = Math.floor(width * dpr);
                canvas.height = Math.floor(height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                seed();
            }

            function seed() {
                particles.length = 0;
                const area = width * height;
                const count = Math.min(110, Math.max(40, Math.floor(area / 14000)));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.25,
                        vy: (Math.random() - 0.5) * 0.25,
                        r: Math.random() * 1.4 + 0.4,
                        twinkle: Math.random() * Math.PI * 2,
                    });
                }
            }

            function step(t) {
                ctx.clearRect(0, 0, width, height);

                // Draw connecting lines first (underneath the dots).
                for (let i = 0; i < particles.length; i++) {
                    const a = particles[i];
                    for (let j = i + 1; j < particles.length; j++) {
                        const b = particles[j];
                        const dx = a.x - b.x;
                        const dy = a.y - b.y;
                        const d2 = dx * dx + dy * dy;
                        if (d2 < LINK_DIST_SQ) {
                            const alpha = (1 - d2 / LINK_DIST_SQ) * 0.35;
                            ctx.strokeStyle = `rgba(110, 190, 230, ${alpha})`;
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.stroke();
                        }
                    }
                }

                // Update + draw particles.
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;

                    // Mouse interaction: gentle repulsion.
                    if (mouse.active) {
                        const dx = p.x - mouse.x;
                        const dy = p.y - mouse.y;
                        const d2 = dx * dx + dy * dy;
                        if (d2 < MOUSE_RADIUS * MOUSE_RADIUS && d2 > 0.0001) {
                            const force = (1 - Math.sqrt(d2) / MOUSE_RADIUS) * 0.6;
                            const inv = 1 / Math.sqrt(d2);
                            p.vx += dx * inv * force * 0.05;
                            p.vy += dy * inv * force * 0.05;
                        }
                    }

                    // Soft drag so velocities don't run away.
                    p.vx *= 0.992;
                    p.vy *= 0.992;
                    // Keep a minimum drift.
                    if (Math.abs(p.vx) < 0.04) p.vx += (Math.random() - 0.5) * 0.02;
                    if (Math.abs(p.vy) < 0.04) p.vy += (Math.random() - 0.5) * 0.02;

                    // Wrap around the edges.
                    if (p.x < -10) p.x = width + 10;
                    else if (p.x > width + 10) p.x = -10;
                    if (p.y < -10) p.y = height + 10;
                    else if (p.y > height + 10) p.y = -10;

                    // Subtle twinkle.
                    p.twinkle += 0.02;
                    const flicker = 0.6 + 0.4 * Math.sin(p.twinkle);

                    // Glow.
                    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);
                    glow.addColorStop(0, `rgba(140, 210, 245, ${0.5 * flicker})`);
                    glow.addColorStop(1, 'rgba(140, 210, 245, 0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI * 2);
                    ctx.fill();

                    // Core.
                    ctx.fillStyle = `rgba(220, 240, 250, ${0.85 * flicker})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (!prefersReduced) requestAnimationFrame(step);
            }

            function staticFrame() {
                // One render for reduced-motion users.
                step(0);
            }

            window.addEventListener('resize', resize, { passive: true });
            window.addEventListener('pointermove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                mouse.active = true;
            }, { passive: true });
            window.addEventListener('pointerleave', () => { mouse.active = false; }, { passive: true });

            resize();
            if (prefersReduced) staticFrame();
            else requestAnimationFrame(step);
        })();
    </script>
</body>
</html>
