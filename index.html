<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menta Systems</title>
    <meta name="description" content="Menta Systems">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .stealth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .stealth-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .stealth-brand {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .stealth-brand-icon {
            height: 1em;
            width: auto;
            border-radius: 8px;
        }
        .stealth-brand-accent {
            font-weight: 300;
            color: var(--text-secondary);
        }
        .stealth-tagline {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .stealth-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(13, 92, 132, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }
        .stealth-footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stealth-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .stealth-footer a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <main class="stealth-main">
        <div class="stealth-bg"></div>
        <div class="stealth-content">
            <div class="stealth-brand">
                <img src="icon.png" alt="" class="stealth-brand-icon">
                MENTA<span class="stealth-brand-accent"> systems</span>
            </div>
            <p class="stealth-tagline">In progress</p>
        </div>
    </main>

    <footer class="stealth-footer">
        <span>&copy; 2025 Menta Systems</span>
        <span aria-hidden="true">·</span>
        <a href="aviso-legal.html">Aviso Legal</a>
        <span aria-hidden="true">·</span>
        <a href="politica-privacidad.html">Política de Privacidad</a>
    </footer>
</body>
</html>
